<div id="help-modal" class="help-modal" role="dialog" aria-label="help" aria-modal="true" hidden style="display: none;">
  <div class="help-modal-backdrop" id="help-modal-backdrop"></div>
  <div class="help-modal-box">
    <div id="help-modal-results" class="help-modal-results">
      <p class="help-modal-empty-title" style="text-align: center;">criteria</p>
      <ul class="help-modal-tips" inert>
        <li><span class="help-modal-key">open search</span><span class="help-modal-desc"><code>/</code></span></li>
        <li><span class="help-modal-key">toggle this modal</span><span class="help-modal-desc"><code>?</code></span>
        </li>
        <li><span class="help-modal-key">toggle status bar</span><span class="help-modal-desc"><code>v</code></span>
        </li>
        <li><span class="help-modal-key">toggle toc</span><span class="help-modal-desc"><code>alt + c</code></span></li>
        <li><span class="help-modal-key">go to top</span><span class="help-modal-desc"><code>alt + u</code></span></li>
        <li><span class="help-modal-key">go to /</span><span class="help-modal-desc"><code>alt + e</code></span></li>
        <li><span class="help-modal-key">go to /posts/</span><span class="help-modal-desc"><code>alt + p</code></span></li>
        <li><span class="help-modal-key">go to /repo/</span><span class="help-modal-desc"><code>alt + r</code></span></li>
      </ul>
    </div>
  </div>
</div>

<script>
  (function () {
    function init() {
      var modal = document.getElementById('help-modal');
      var backdrop = document.getElementById('help-modal-backdrop');

      function openModal() {
        modal.hidden = false;
        modal.removeAttribute('hidden');
        modal.style.display = '';
      }

      function closeModal() {
        if (modal.classList.contains('help-modal-closing')) return;
        var box = modal.querySelector('.help-modal-box');
        modal.classList.add('help-modal-closing');
        box.addEventListener('animationend', function done() {
          box.removeEventListener('animationend', done);
          modal.classList.remove('help-modal-closing');
          modal.hidden = true;
          modal.setAttribute('hidden', '');
          modal.style.display = 'none';
        });
      }

      backdrop.onclick = closeModal;

      window.OpenHelp = openModal;
      window.CloseHelp = closeModal;
      window.ToggleHelp = function () {
        if (!modal.hidden) closeModal();
        else openModal();
      };

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !modal.hidden) closeModal();
      });

      document.body.addEventListener('click', function (event) {
        var helplink = event.target.closest('a[href*="/help"]');
        if (helplink && helplink.pathname.indexOf('/help') !== -1 && !helplink.target) {
          event.preventDefault();
          openModal();
        }
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
